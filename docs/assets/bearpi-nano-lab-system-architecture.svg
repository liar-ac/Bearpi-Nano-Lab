<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="460" viewBox="0 0 1180 460" role="img" aria-labelledby="title desc">
  <title id="title">BearPi-Nano-Lab系统架构</title>
  <desc id="desc">BearPi-Nano-Lab的简化系统架构图，展示实验室用户、Web控制台、移动端、Django后端、MySQL、Redis、BearPi-HMNano固件和E53_IA1传感器之间的关系。</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#475569"/>
    </marker>
    <marker id="arrow-green" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#16a34a"/>
    </marker>
    <style>
      .title{font:700 28px "Microsoft YaHei","PingFang SC","Noto Sans CJK SC",Arial,sans-serif;fill:#0f172a}
      .label{font:600 16px "Microsoft YaHei","PingFang SC","Noto Sans CJK SC",Arial,sans-serif;fill:#0f172a}
      .small{font:500 13px "Microsoft YaHei","PingFang SC","Noto Sans CJK SC",Arial,sans-serif;fill:#475569}
      .edge{font:500 13px "Microsoft YaHei","PingFang SC","Noto Sans CJK SC",Arial,sans-serif;fill:#334155}
      .box{fill:#ffffff;stroke:#94a3b8;stroke-width:1.4;rx:12}
      .backend{fill:#f8fafc;stroke:#334155;stroke-width:1.8;rx:14}
      .db{fill:#eff6ff;stroke:#2563eb;stroke-width:1.5;rx:12}
      .device{fill:#f0fdf4;stroke:#16a34a;stroke-width:1.5;rx:12}
      .line{fill:none;stroke:#475569;stroke-width:1.7;marker-end:url(#arrow)}
      .dash{fill:none;stroke:#64748b;stroke-width:1.7;stroke-dasharray:7 7;marker-end:url(#arrow)}
      .green{fill:none;stroke:#16a34a;stroke-width:1.7;marker-end:url(#arrow-green)}
    </style>
  </defs>
  <rect width="1180" height="460" fill="#ffffff"/>
  <text x="590" y="44" text-anchor="middle" class="title">BearPi-Nano-Lab系统架构</text>

  <g transform="translate(55 174)">
    <circle cx="28" cy="18" r="10" fill="#e0f2fe" stroke="#64748b" stroke-width="1.2"/>
    <line x1="28" y1="28" x2="28" y2="70" stroke="#64748b" stroke-width="1.4"/>
    <line x1="8" y1="43" x2="48" y2="43" stroke="#64748b" stroke-width="1.4"/>
    <line x1="28" y1="70" x2="8" y2="108" stroke="#64748b" stroke-width="1.4"/>
    <line x1="28" y1="70" x2="48" y2="108" stroke="#64748b" stroke-width="1.4"/>
    <text x="28" y="137" text-anchor="middle" class="label">实验室用户</text>
  </g>

  <rect x="210" y="135" width="170" height="72" class="box"/>
  <text x="295" y="166" text-anchor="middle" class="label">Web控制台</text>
  <text x="295" y="190" text-anchor="middle" class="small">Vue3+ElementPlus</text>

  <rect x="210" y="260" width="170" height="72" class="box"/>
  <text x="295" y="291" text-anchor="middle" class="label">移动端</text>
  <text x="295" y="315" text-anchor="middle" class="small">uni-app</text>

  <rect x="500" y="185" width="210" height="96" class="backend"/>
  <text x="605" y="224" text-anchor="middle" class="label">Django后端</text>
  <text x="605" y="249" text-anchor="middle" class="small">RESTAPI+WebSocket+JWT</text>

  <rect x="830" y="110" width="170" height="72" class="db"/>
  <text x="915" y="141" text-anchor="middle" class="label">MySQL</text>
  <text x="915" y="165" text-anchor="middle" class="small">业务数据</text>

  <rect x="830" y="265" width="170" height="72" class="db"/>
  <text x="915" y="296" text-anchor="middle" class="label">Redis可选</text>
  <text x="915" y="320" text-anchor="middle" class="small">实时通道</text>

  <rect x="830" y="380" width="170" height="56" class="device"/>
  <text x="915" y="413" text-anchor="middle" class="label">BearPi-HMNano固件</text>

  <rect x="1040" y="380" width="110" height="56" class="device"/>
  <text x="1095" y="404" text-anchor="middle" class="label">E53_IA1</text>
  <text x="1095" y="425" text-anchor="middle" class="small">传感器/执行器</text>

  <path d="M105,232 C140,205 165,181 210,171" class="line"/>
  <text x="145" y="190" class="edge">浏览器访问</text>
  <path d="M105,266 C145,286 165,296 210,296" class="line"/>
  <text x="132" y="306" class="edge">H5/小程序访问</text>

  <path d="M380,171 C425,183 455,205 500,225" class="line"/>
  <text x="408" y="190" class="edge">RESTAPI/WebSocket</text>
  <path d="M380,296 C425,286 455,264 500,245" class="line"/>
  <text x="408" y="292" class="edge">RESTAPI/WebSocket</text>

  <path d="M710,215 C760,185 790,158 830,146" class="line"/>
  <text x="742" y="169" class="edge">读写数据</text>
  <path d="M710,255 C760,275 790,292 830,301" class="dash"/>
  <text x="742" y="286" class="edge">实时消息</text>

  <path d="M830,407 C760,400 735,340 684,281" class="green"/>
  <text x="706" y="365" class="edge">遥测上报</text>
  <path d="M710,234 C762,286 785,350 830,396" class="green"/>
  <text x="736" y="330" class="edge">命令下发</text>
  <path d="M1000,408 L1040,408" class="green"/>
  <text x="1008" y="392" class="edge">采集与控制</text>
</svg>
